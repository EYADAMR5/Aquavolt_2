<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaVolt | Contact & Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0a192f; --blue: #007bff; }
        body { font-family: sans-serif; background: #fff; }
        .navbar { background: var(--navy) !important; }
        .contact-header { background: var(--navy); color: white; padding: 100px 0; text-align: center; }
        .contact-form { padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: -80px; background: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AQUA<span class="text-primary">VOLT</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="tech.html">Solutions</a>
                <a class="nav-link active" href="contact.html">Our Team</a>
            </div>
        </div>
    </nav>

    <div class="contact-header">
        <h1 class="display-4 fw-bold">Let's Work Together</h1>
        <p class="lead opacity-75">Contact our sales team for a custom quote</p>
    </div>

    <div class="container mb-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="contact-form">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control p-3 bg-light border-0" placeholder="Eyad Amr">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control p-3 bg-light border-0" placeholder="name@company.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Project Details</label>
                                <textarea class="form-control p-3 bg-light border-0" rows="4" placeholder="Tell us about your farm or canal..."></textarea>
                            </div>
                            <div class="col-12 text-center">
                                <button type="submit" class="btn btn-primary btn-lg px-5 py-3 rounded-pill mt-3">Send Inquiry</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <h2 class="text-center fw-bold mb-5">Leadership Team</h2>
        <div class="row g-4 text-center">
            <div class="col-md-3">
                <img src="eyad.jpg" class="rounded-circle mb-3 border border-4 border-primary" style="width:120px; height:120px; object-fit:cover;">
                <h6 class="fw-bold mb-0">Eyad Amr</h6>
                <p class="text-primary small">CEO & Founder</p>
            </div>
            <div class="col-md-3">
                <img src="kareem.jpg" class="rounded-circle mb-3" style="width:120px; height:120px; object-fit:cover;">
                <h6 class="fw-bold mb-0">Kareem Hassan</h6>
                <p class="text-muted small">COO</p>
            </div>
            <div class="col-md-3">
                <img src="sohaib.jpg" class="rounded-circle mb-3" style="width:120px; height:120px; object-fit:cover;">
                <h6 class="fw-bold mb-0">Sohaib Kassem</h6>
                <p class="text-muted small">Fabrication Lead</p>
            </div>
            <div class="col-md-3">
                <img src="mohamed.jpg" class="rounded-circle mb-3" style="width:120px; height:120px; object-fit:cover;">
                <h6 class="fw-bold mb-0">Mohamed Sherif</h6>
                <p class="text-muted small">CRO</p>
            </div>
        </div>
    </div>

</body>
</html>
