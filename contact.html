<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Structure | AquaVolt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background-color: #050a15; color: white; }
        .unit-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 30px; border-radius: 15px; text-align: center; transition: 0.4s;
        }
        .unit-card:hover { border-color: #00f2ff; background: rgba(0, 242, 255, 0.05); }
        
        .profile-hex {
            width: 150px; height: 150px; margin: 0 auto 20px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background: #112240; border: 2px solid #00f2ff; overflow: hidden;
        }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(50%) contrast(120%); }
    </style>
</head>
<body>

    <div class="container py-5">
        <h2 class="text-center fw-bold mb-5" style="letter-spacing: 5px;">COMMAND <span style="color:#00f2ff">CENTRAL</span></h2>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-3" data-aos="flip-left">
                <div class="unit-card">
                    <div class="profile-hex"><img src="eyad.jpg" alt="CEO"></div>
                    <h5 class="fw-bold">EYAD AMR</h5>
                    <p class="small text-info">ARCHITECT-01</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-left" data-aos-delay="200">
                <div class="unit-card">
                    <div class="profile-hex"><img src="kareem.jpg" alt="COO"></div>
                    <h5 class="fw-bold">KAREEM H.</h5>
                    <p class="small text-info">OPERATIONS-02</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-left" data-aos-delay="400">
                <div class="unit-card">
                    <div class="profile-hex"><img src="sohaib.jpg" alt="Fabrication"></div>
                    <h5 class="fw-bold">SOHAIB K.</h5>
                    <p class="small text-info">MECHANIC-03</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-left" data-aos-delay="600">
                <div class="unit-card">
                    <div class="profile-hex"><img src="mohamed.jpg" alt="Research"></div>
                    <h5 class="fw-bold">M. SHERIF</h5>
                    <p class="small text-info">RESEARCH-04</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init(); </script>
</body>
</html>
