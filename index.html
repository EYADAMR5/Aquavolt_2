<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaVolt | Advanced Hydro Dynamics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050a15; }
        body { background: var(--bg); color: white; font-family: 'Lexend', sans-serif; }

        /* شريط تقدم القراءة */
        #progress-bar {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: linear-gradient(to right, var(--neon), #7000ff);
            z-index: 9999; transition: 0.2s;
        }

        /* Mouse Cursor Custom (اختياري بس بيضرب نار) */
        .cursor-follower {
            position: fixed; width: 20px; height: 20px; border: 2px solid var(--neon);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            transition: 0.1s; z-index: 10000; opacity: 0.5;
        }

        /* Glassmorphism Sections */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 30px; padding: 50px;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-img { animation: float 4s ease-in-out infinite; }

        .nav-link:hover { color: var(--neon) !important; text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div id="progress-bar"></div>
    <div class="cursor-follower d-none d-lg-block"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">AQUA<span style="color:var(--neon)">VOLT</span></a>
            <div class="navbar-nav ms-auto d-flex align-items-center">
                <a class="nav-link px-3" href="index.html">System</a>
                <a class="nav-link px-3" href="tech.html">Core Tech</a>
                <a class="nav-link px-3" href="contact.html">Human Capital</a>
                <button class="btn btn-outline-info rounded-pill ms-3 px-4 shadow-sm" onclick="alert('System Initialized')">Login</button>
            </div>
        </div>
    </nav>

    <header class="container py-5 mt-5">
        <div class="row align-items-center">
            <div class="col-lg-6" data-aos="fade-right">
                <h1 class="display-1 fw-bold mb-4">THE <span style="color:var(--neon)">AQUA</span> PROTOCOL</h1>
                <p class="lead opacity-50 mb-5">Harnessing the kinetic energy of fluids with zero-loss efficiency. Welcome to the future of irrigation.</p>
                <div class="d-flex gap-3">
                    <button class="btn btn-info btn-lg px-5 py-3 rounded-pill fw-bold">BOOT SYSTEM</button>
                    <button class="btn btn-dark btn-lg px-5 py-3 rounded-pill border-secondary">SPECS</button>
                </div>
            </div>
            <div class="col-lg-6 text-center" data-aos="zoom-in">
                <img src="https://i.ibb.co/60Z0M2P/turbine-tech.png" class="img-fluid float-img" style="max-width: 80% shadow: 0 0 50px rgba(0,242,255,0.2)">
            </div>
        </div>
    </header>

    <section class="container py-5">
        <div class="glass-panel" data-aos="fade-up">
            <div class="row text-center g-5">
                <div class="col-md-4">
                    <h2 class="fw-bold" style="color:var(--neon)">98%</h2>
                    <p class="small opacity-50 uppercase">Efficiency Rate</p>
                </div>
                <div class="col-md-4">
                    <h2 class="fw-bold" style="color:var(--neon)">24/7</h2>
                    <p class="small opacity-50">Active Generation</p>
                </div>
                <div class="col-md-4">
                    <h2 class="fw-bold" style="color:var(--neon)">AI</h2>
                    <p class="small opacity-50">Smart Integration</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        // كود شريط التقدم
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // كود الـ Cursor Follower
        const cursor = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
